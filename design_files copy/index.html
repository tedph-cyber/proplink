<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>StrongTower Holdings — Find Your Perfect Property</title>
  <meta name="description" content="Browse verified houses and land for sale across Nigeria. Contact owners directly — no agents, no middlemen." />

  <!-- Alternate display/body fonts for the Type-pairing tweak -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400..600;1,6..72,400..600&family=Spectral:ital,wght@0,400;0,600;1,400&family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..600;1,6..96,400..600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="components.css" />
  <link rel="stylesheet" href="home.css" />
  <link rel="stylesheet" href="listings.css" />
  <link rel="stylesheet" href="blog.css" />

  <style>
    /* Page transition — must fail-safe to VISIBLE (no `both` fill, base state is opacity:1) */
    .page { animation: pageIn .55s var(--ease); }
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(calc(14px * var(--motion, 1))); }
      to   { opacity: 1; transform: none; }
    }
    @media (prefers-reduced-motion: reduce) { .page { animation: none; } }
    /* boot splash */
    #boot { position: fixed; inset: 0; display: grid; place-items: center; background: var(--paper); z-index: 999; transition: opacity .4s; }
    #boot.gone { opacity: 0; pointer-events: none; }
    #boot .b-mark { width: 30px; height: 30px; border: 2.5px solid var(--line); border-top-color: var(--gold); border-radius: 999px; animation: spin .8s linear infinite; }
  </style>
</head>
<body>
  <div id="boot"><div class="b-mark"></div></div>
  <div id="root"></div>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Data (plain JS) -->
  <script src="data.js"></script>
  <script src="blog-data.js"></script>

  <!-- App (JSX) -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="nav-footer.jsx"></script>
  <script type="text/babel" src="home.jsx"></script>
  <script type="text/babel" src="listings.jsx"></script>
  <script type="text/babel" src="detail.jsx"></script>
  <script type="text/babel" src="blog.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel">
    // hide boot splash once React has mounted
    (function () {
      const boot = document.getElementById('boot');
      const check = () => {
        if (document.querySelector('#root .nav')) {
          boot.classList.add('gone');
          setTimeout(() => boot.remove(), 450);
        } else { setTimeout(check, 60); }
      };
      check();
    })();
  </script>
</body>
</html>
